name: Frontend Tests & Deployment

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'code (3)/**'
      - '.github/workflows/frontend*.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'code (3)/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'code (3)/package-lock.json'
    
    - name: Install dependencies
      run: cd "code (3)" && npm ci
    
    - name: Run linting
      run: cd "code (3)" && npm run lint --if-present
    
    - name: Build
      run: cd "code (3)" && npm run build
      env:
        VITE_BASE_URL: ${{ secrets.VITE_BASE_URL_PROD }}
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Vercel
      uses: vercel/action@main
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: './code (3)'
        production: true

  lighthouse:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: cd "code (3)" && npm ci
    
    - name: Build
      run: cd "code (3)" && npm run build
    
    - name: Run Lighthouse
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './code (3)/lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true
